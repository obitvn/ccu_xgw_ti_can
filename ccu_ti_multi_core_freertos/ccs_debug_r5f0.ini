; CCS Debug Initialization Script for Core0 (Cortex_R5_0)
; This script runs when debug session starts

; Reset core on startup
GLOG Global $prog_home "/targetConfigs"
GLOG Global $reset_on_connect "true"

; Load symbols automatically
SETPROTOCOL $abiarm coff

; Configure breakpoints
BREAKSET main

; Run to main automatically
; Note: To continue running when debug stops, configure in CCS:
; Window -> Preferences -> Code Composer Studio -> Debug -> "Do not halt on disconnect"
